<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiketClean • Mess Karyawan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-8px); }
        .nav-active { border-bottom: 3px solid #60a5fa; color: white; }
        .upload-zone { transition: all 0.3s ease; }
        .upload-zone.dragover { background-color: #dbeafe; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<header class="gradient-bg text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md">
                <i class="fa-solid fa-broom text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-semibold tracking-tight">PiketClean</h1>
                <p class="text-blue-100 text-sm -mt-1">Dokumentasi Kebersihan Mess</p>
            </div>
        </div>
        <nav class="flex items-center gap-8 text-sm font-medium">
            <button onclick="navigateTo('input')" id="nav-input" class="nav-active flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Input Piket
            </button>
            <button onclick="navigateTo('history')" id="nav-history" class="flex items-center gap-2">
                <i class="fa-solid fa-list"></i> Riwayat
            </button>
        </nav>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- FORM INPUT -->
    <div id="page-input" class="page">
        <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-sm p-8">
            <h2 class="text-3xl font-semibold mb-2">Form Piket Kebersihan</h2>
            <p class="text-slate-500 mb-8">Isi data dan upload dokumentasi foto</p>

            <form id="piket-form" class="space-y-8">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Nama Mess <span class="text-red-500">*</span></label>
                    <select id="nama-mess" required class="w-full px-5 py-4 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-500">
                        <option value="">Memuat daftar Mess...</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Brand</label>
                    <div class="flex gap-3">
                        <select id="brand-select" class="flex-1 px-5 py-4 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-500">
                            <option value="">Memuat daftar Brand...</option>
                        </select>
                        <button type="button" onclick="addNewBrand()" 
                                class="px-6 py-4 bg-slate-100 hover:bg-slate-200 rounded-2xl font-medium">+ Tambah</button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Nama Petugas <span class="text-red-500">*</span></label>
                    <input id="nama-petugas" type="text" required placeholder="Masukkan nama lengkap"
                           class="w-full px-5 py-4 border border-slate-200 rounded-2xl focus:outline-none focus:border-blue-500">
                </div>

                <!-- Foto Sebelum -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-3">Foto Sebelum</label>
                    <div id="before-upload" class="upload-zone border-2 border-dashed border-slate-300 rounded-3xl p-10 text-center cursor-pointer">
                        <input type="file" id="before-file" accept="image/*" class="hidden">
                        <i class="fa-solid fa-camera text-5xl text-slate-300 mb-4"></i>
                        <p class="font-medium">Foto Sebelum Pembersihan</p>
                        <div id="before-preview" class="hidden mt-6">
                            <img id="before-img" class="mx-auto max-h-64 rounded-2xl shadow-md" alt="Before">
                            <button type="button" onclick="removeBeforePhoto()" class="mt-4 text-red-500 text-sm flex items-center gap-2 mx-auto">
                                <i class="fa-solid fa-trash"></i> Hapus
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Foto Sesudah -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-3">Foto Sesudah</label>
                    <div id="after-upload" class="upload-zone border-2 border-dashed border-slate-300 rounded-3xl p-10 text-center cursor-pointer">
                        <input type="file" id="after-file" accept="image/*" class="hidden">
                        <i class="fa-solid fa-camera text-5xl text-slate-300 mb-4"></i>
                        <p class="font-medium">Foto Setelah Pembersihan</p>
                        <div id="after-preview" class="hidden mt-6">
                            <img id="after-img" class="mx-auto max-h-64 rounded-2xl shadow-md" alt="After">
                            <button type="button" onclick="removeAfterPhoto()" class="mt-4 text-red-500 text-sm flex items-center gap-2 mx-auto">
                                <i class="fa-solid fa-trash"></i> Hapus
                            </button>
                        </div>
                    </div>
                </div>

                <button onclick="submitPiket(event)" id="submit-btn" type="button"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-3xl font-semibold text-lg shadow-lg transition-all">
                    Kirim Dokumentasi
                </button>
            </form>
        </div>
    </div>

    <!-- HISTORY PAGE (sederhana dulu) -->
    <div id="page-history" class="page hidden">
        <h2 class="text-3xl font-semibold mb-6">Riwayat Piket</h2>
        <div id="history-list" class="space-y-6">
            <!-- Akan diisi oleh JS nanti -->
        </div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWerEVULvZChTRpKoG-6rs8mEtGqhTixhW9UXcCp0cZWJvj_L4x_tQWRzMY5DhirmX/exec";

    let beforeFile = null;
    let afterFile = null;

    // Load Mess & Brand dari Sheet "DATA"
    async function loadReferenceData() {
        try {
            const res = await fetch(`${APPS_SCRIPT_URL}?action=getReference`);
            const data = await res.json();

            // Nama Mess
            const messSelect = document.getElementById('nama-mess');
            messSelect.innerHTML = '<option value="">Pilih Nama Mess</option>';
            data.mess.forEach(m => {
                const opt = new Option(m, m);
                messSelect.add(opt);
            });

            // Brand
            const brandSelect = document.getElementById('brand-select');
            brandSelect.innerHTML = '<option value="">Pilih Brand</option>';
            data.brands.forEach(b => {
                const opt = new Option(b, b);
                brandSelect.add(opt);
            });
        } catch (err) {
            console.error(err);
            alert("Gagal memuat data Mess & Brand. Pastikan Apps Script sudah di-deploy.");
        }
    }

    // Setup Upload Foto
    function setupPhotoUpload() {
        const beforeZone = document.getElementById('before-upload');
        const afterZone = document.getElementById('after-upload');

        beforeZone.addEventListener('click', () => document.getElementById('before-file').click());
        afterZone.addEventListener('click', () => document.getElementById('after-file').click());

        document.getElementById('before-file').addEventListener('change', e => handleFile(e, 'before'));
        document.getElementById('after-file').addEventListener('change', e => handleFile(e, 'after'));
    }

    async function handleFile(e, type) {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) return alert("Maksimal ukuran foto 10MB!");

        const compressed = await compressImage(file);
        const reader = new FileReader();
        reader.onload = ev => {
            if (type === 'before') {
                beforeFile = compressed;
                document.getElementById('before-preview').classList.remove('hidden');
                document.getElementById('before-img').src = ev.target.result;
            } else {
                afterFile = compressed;
                document.getElementById('after-preview').classList.remove('hidden');
                document.getElementById('after-img').src = ev.target.result;
            }
        };
        reader.readAsDataURL(file);
    }

    async function compressImage(file) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let { width, height } = img;
                if (width > 1000) {
                    height = Math.round(height * 1000 / width);
                    width = 1000;
                }
                canvas.width = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                canvas.toBlob(blob => {
                    resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                }, 'image/jpeg', 0.75);
            };
            img.src = URL.createObjectURL(file);
        });
    }

    function removeBeforePhoto() {
        beforeFile = null;
        document.getElementById('before-preview').classList.add('hidden');
    }

    function removeAfterPhoto() {
        afterFile = null;
        document.getElementById('after-preview').classList.add('hidden');
    }

    // SUBMIT FUNCTION - SUDAH DIPERBAIKI
    async function submitPiket(e) {
        e.preventDefault();

        const namaMess = document.getElementById('nama-mess').value;
        const brand = document.getElementById('brand-select').value;
        const namaPetugas = document.getElementById('nama-petugas').value;

        if (!namaMess || !namaPetugas || !beforeFile || !afterFile) {
            return alert("❌ Mohon lengkapi Nama Mess, Nama Petugas, dan kedua foto!");
        }

        const btn = document.getElementById('submit-btn');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '⏳ Mengupload Foto...';

        try {
            const beforeB64 = await fileToBase64(beforeFile);
            const afterB64 = await fileToBase64(afterFile);

            const payload = {
                action: "submit",
                namaMess,
                brand: brand || "-",
                namaPetugas,
                beforeBase64: beforeB64,
                afterBase64: afterB64,
                beforeName: beforeFile.name,
                afterName: afterFile.name
            };

            const res = await fetch(APPS_SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload),
                headers: { "Content-Type": "application/json" }
            });

            const result = await res.text();
            console.log("Server Response:", result);

            if (result.includes("Success")) {
                alert("✅ Dokumentasi berhasil disimpan!");
                document.getElementById('piket-form').reset();
                removeBeforePhoto();
                removeAfterPhoto();
            } else {
                alert("❌ Gagal menyimpan:\n" + result);
            }
        } catch (err) {
            console.error(err);
            alert("❌ Terjadi kesalahan saat mengupload.\nCek koneksi internet atau ukuran foto.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function addNewBrand() {
        const brand = prompt("Masukkan nama Brand baru:");
        if (brand && brand.trim()) {
            const select = document.getElementById('brand-select');
            const option = new Option(brand.trim(), brand.trim());
            select.add(option);
            select.value = brand.trim();
        }
    }

    function navigateTo(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(`page-${page}`).classList.remove('hidden');
    }

    // INIT
    window.onload = () => {
        loadReferenceData();
        setupPhotoUpload();
        navigateTo('input');
    };
</script>
</body>
</html>
