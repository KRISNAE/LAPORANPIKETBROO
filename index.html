<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PiketClean • Mess Karyawan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%); }
        .upload-zone { transition: all 0.3s ease; }
        .upload-zone.dragover { background-color: #dbeafe; border-color: #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<header class="gradient-bg text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white/20 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-broom text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-semibold">PiketClean</h1>
                <p class="text-blue-100 text-sm -mt-1">Dokumentasi Kebersihan Mess</p>
            </div>
        </div>
        <nav class="flex gap-8 text-sm font-medium">
            <button onclick="navigateTo('input')" id="nav-input" class="nav-active flex items-center gap-2"><i class="fa-solid fa-plus"></i> Input</button>
            <button onclick="navigateTo('history')" id="nav-history" class="flex items-center gap-2"><i class="fa-solid fa-list"></i> Riwayat</button>
        </nav>
    </div>
</header>

<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- INPUT PAGE -->
    <div id="page-input" class="page">
        <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow p-8">
            <h2 class="text-3xl font-semibold mb-2">Form Piket Kebersihan</h2>
            <p class="text-slate-500 mb-8">Isi data dan upload foto dokumentasi</p>

            <form id="piket-form" class="space-y-8">
                <div>
                    <label class="block text-sm font-medium mb-2">Nama Mess <span class="text-red-500">*</span></label>
                    <select id="nama-mess" required class="w-full px-5 py-4 border border-slate-200 rounded-2xl focus:border-blue-500"></select>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Brand</label>
                    <div class="flex gap-3">
                        <select id="brand-select" class="flex-1 px-5 py-4 border border-slate-200 rounded-2xl focus:border-blue-500"></select>
                        <button type="button" onclick="addNewBrand()" class="px-6 py-4 bg-slate-100 hover:bg-slate-200 rounded-2xl">+ Tambah</button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Nama Petugas <span class="text-red-500">*</span></label>
                    <input id="nama-petugas" type="text" required placeholder="Nama Lengkap Petugas"
                           class="w-full px-5 py-4 border border-slate-200 rounded-2xl focus:border-blue-500">
                </div>

                <!-- Foto Sebelum -->
                <div>
                    <label class="block text-sm font-medium mb-3">Foto Sebelum</label>
                    <div id="before-upload" class="upload-zone border-2 border-dashed border-slate-300 rounded-3xl p-10 text-center cursor-pointer">
                        <input type="file" id="before-file" accept="image/*" class="hidden">
                        <i class="fa-solid fa-camera text-5xl text-slate-300 mb-4"></i>
                        <p class="font-medium">Foto Sebelum Pembersihan</p>
                        <div id="before-preview" class="hidden mt-6">
                            <img id="before-img" class="mx-auto max-h-64 rounded-2xl shadow-md">
                            <button type="button" onclick="removeBeforePhoto()" class="mt-4 text-red-500 text-sm">Hapus</button>
                        </div>
                    </div>
                </div>

                <!-- Foto Sesudah -->
                <div>
                    <label class="block text-sm font-medium mb-3">Foto Sesudah</label>
                    <div id="after-upload" class="upload-zone border-2 border-dashed border-slate-300 rounded-3xl p-10 text-center cursor-pointer">
                        <input type="file" id="after-file" accept="image/*" class="hidden">
                        <i class="fa-solid fa-camera text-5xl text-slate-300 mb-4"></i>
                        <p class="font-medium">Foto Setelah Pembersihan</p>
                        <div id="after-preview" class="hidden mt-6">
                            <img id="after-img" class="mx-auto max-h-64 rounded-2xl shadow-md">
                            <button type="button" onclick="removeAfterPhoto()" class="mt-4 text-red-500 text-sm">Hapus</button>
                        </div>
                    </div>
                </div>

                <button onclick="submitPiket(event)" id="submit-btn" type="button"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-3xl font-semibold text-lg">
                    📤 Kirim Dokumentasi
                </button>
            </form>
        </div>
    </div>

    <!-- HISTORY PAGE -->
    <div id="page-history" class="page hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-semibold">Riwayat Piket</h2>
            <button onclick="loadHistory()" class="text-blue-600 hover:text-blue-700">
                <i class="fa-solid fa-refresh"></i> Refresh
            </button>
        </div>
        <div id="history-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwWerEVULvZChTRpKoG-6rs8mEtGqhTixhW9UXcCp0cZWJvj_L4x_tQWRzMY5DhirmX/exec";

    let beforeFile = null;
    let afterFile = null;

    async function loadReferenceData() {
        try {
            const res = await fetch(`${APPS_SCRIPT_URL}?action=getReference`);
            const data = await res.json();

            const messSelect = document.getElementById('nama-mess');
            messSelect.innerHTML = '<option value="">Pilih Nama Mess</option>';
            data.mess.forEach(m => messSelect.add(new Option(m, m)));

            const brandSelect = document.getElementById('brand-select');
            brandSelect.innerHTML = '<option value="">Pilih Brand</option>';
            data.brands.forEach(b => brandSelect.add(new Option(b, b)));
        } catch (e) {
            console.error(e);
        }
    }

    function setupPhotoUpload() {
        document.getElementById('before-upload').onclick = () => document.getElementById('before-file').click();
        document.getElementById('after-upload').onclick = () => document.getElementById('after-file').click();

        document.getElementById('before-file').onchange = e => handleFile(e, 'before');
        document.getElementById('after-file').onchange = e => handleFile(e, 'after');
    }

    async function handleFile(e, type) {
        const file = e.target.files[0];
        if (!file) return;

        if (file.size > 8 * 1024 * 1024) {
            alert("Maksimal ukuran foto 8MB");
            return;
        }

        const compressedFile = await compressImage(file);
        
        const reader = new FileReader();
        reader.onload = function(ev) {
            if (type === 'before') {
                beforeFile = compressedFile;
                document.getElementById('before-preview').classList.remove('hidden');
                document.getElementById('before-img').src = ev.target.result;
            } else {
                afterFile = compressedFile;
                document.getElementById('after-preview').classList.remove('hidden');
                document.getElementById('after-img').src = ev.target.result;
            }
        };
        reader.readAsDataURL(file);
    }

    async function compressImage(file) {
        return new Promise(resolve => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if (w > 900) { h = Math.round(h * 900 / w); w = 900; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                canvas.toBlob(blob => {
                    resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                }, 'image/jpeg', 0.7);
            };
            img.src = URL.createObjectURL(file);
        });
    }

    function removeBeforePhoto() {
        beforeFile = null;
        document.getElementById('before-preview').classList.add('hidden');
        document.getElementById('before-file').value = '';
    }

    function removeAfterPhoto() {
        afterFile = null;
        document.getElementById('after-preview').classList.add('hidden');
        document.getElementById('after-file').value = '';
    }

    async function submitPiket(e) {
        e.preventDefault();

        const namaMess = document.getElementById('nama-mess').value.trim();
        const brand = document.getElementById('brand-select').value;
        const namaPetugas = document.getElementById('nama-petugas').value.trim();

        console.log("Before File:", beforeFile ? "ADA" : "TIDAK ADA");
        console.log("After File:", afterFile ? "ADA" : "TIDAK ADA");

        if (!namaMess || !namaPetugas || !beforeFile || !afterFile) {
            return alert("❌ Mohon lengkapi semua data dan kedua foto!");
        }

        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerHTML = '⏳ Mengupload...';

        try {
            const beforeB64 = await fileToBase64(beforeFile);
            const afterB64 = await fileToBase64(afterFile);

            const res = await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: "submit",
                    namaMess,
                    brand: brand || "-",
                    namaPetugas,
                    beforeBase64: beforeB64,
                    afterBase64: afterB64,
                    beforeName: beforeFile.name,
                    afterName: afterFile.name
                })
            });

            const result = await res.text();
            console.log("Response:", result);

            if (result.includes("Success")) {
                alert("✅ Berhasil disimpan ke Google Sheets!");
                document.getElementById('piket-form').reset();
                removeBeforePhoto();
                removeAfterPhoto();
                loadHistory();
            } else {
                alert("❌ Gagal: " + result);
            }
        } catch (err) {
            console.error(err);
            alert("❌ Terjadi kesalahan saat upload.");
        } finally {
            btn.disabled = false;
            btn.innerHTML = '📤 Kirim Dokumentasi';
        }
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    function addNewBrand() {
        const brand = prompt("Masukkan nama Brand baru:");
        if (brand?.trim()) {
            const select = document.getElementById('brand-select');
            select.add(new Option(brand.trim(), brand.trim()));
            select.value = brand.trim();
        }
    }

    async function loadHistory() {
        const container = document.getElementById('history-grid');
        container.innerHTML = '<p class="text-center py-10">Memuat riwayat...</p>';

        try {
            const res = await fetch(`${APPS_SCRIPT_URL}?action=getHistory`);
            const data = await res.json();

            container.innerHTML = '';
            if (data.length === 0) {
                container.innerHTML = '<p class="text-center py-10 text-slate-500">Belum ada data piket.</p>';
                return;
            }

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-white rounded-3xl overflow-hidden shadow";
                div.innerHTML = `
                    <div class="grid grid-cols-2 gap-1">
                        <img src="${item.beforeUrl}" class="h-48 w-full object-cover">
                        <img src="${item.afterUrl}" class="h-48 w-full object-cover">
                    </div>
                    <div class="p-5">
                        <div class="font-semibold">${item.namaMess}</div>
                        <div class="text-sm text-slate-500">${item.brand} • ${item.namaPetugas}</div>
                        <div class="text-xs text-slate-400 mt-1">${new Date(item.timestamp).toLocaleString('id-ID')}</div>
                    </div>
                `;
                container.appendChild(div);
            });
        } catch (e) {
            container.innerHTML = '<p class="text-red-500 text-center py-10">Gagal memuat riwayat</p>';
        }
    }

    function navigateTo(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(`page-${page}`).classList.remove('hidden');
        if (page === 'history') loadHistory();
    }

    window.onload = () => {
        loadReferenceData();
        setupPhotoUpload();
        navigateTo('input');
    };
</script>
</body>
</html>
